version: '3.9'

services:
  # -------------------- RabbitMQ --------------------
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rider-driver-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    networks:
      - rider-driver
  # -------------------- PostgreSQL --------------------
  postgres:
    image: postgres:16
    container_name: rider-driver-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: rider_driver_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rider-driver

  # -------------------- MongoDB --------------------
  mongo:
    image: mongo:7
    container_name: rider-driver-mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
      MONGO_INITDB_DATABASE: rider_driver_db
    volumes:
      - mongo_data:/data/db
    networks:
      - rider-driver

  # -------------------- Redis --------------------
  redis:
    image: redis:alpine
    container_name: rider-driver-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - rider-driver
# -------------------- NETWORK --------------------
networks:
  rider-driver:
    driver: bridge

# -------------------- VOLUMES --------------------
volumes:
  mongo_data:
  postgres_data:
  redis_data: